<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login 💖</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
  font-family:'Segoe UI';
}
.box{
  text-align:center;
  background: rgba(255,255,255,0.4);
  padding:40px;
  border-radius:20px;
}
input{
  padding:12px;
  border-radius:10px;
  border:none;
}
button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff6fa5;
  color:white;
}
</style>
</head>

<body>
<div class="box">
  <h2>Enter Secret Code 🎂</h2>
  <input type="password" id="pass" placeholder="DDMMYYYY">
  <br>
  <button onclick="check()">Unlock 💖</button>
</div>

<script>
function check(){
  if(document.getElementById("pass").value==="06052006"){
    sessionStorage.setItem("loggedIn","yes");
    window.location.href="birthday.html";
  } else {
    alert("Wrong code 😜");
  }
}
</script>

</body>
</html>
