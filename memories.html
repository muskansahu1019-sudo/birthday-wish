<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Memories 💕</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#d8b4f8,#a0e7e5,#ffc0cb);
  font-family:'Segoe UI';
  text-align:center;
  overflow:hidden;
}

/* container center */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
}
 <audio autoplay loop>
  <source src="Tu Chahiye - Bajrangi Bhaijaan-Downringtone.com.mp3">
</audio>

/* IMAGE */
img{
  width:60vw;
  max-width:500px;
  height:65vh;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  transition:opacity 0.6s ease;
}

/* TEXT BELOW IMAGE */
.text{
  margin-top:20px;
  font-size:24px;
  color:#333;
  transition:opacity 0.6s ease;
}

/* floating hearts */
.heart{
  position:absolute;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
</style>

</head>

<body>

<div class="container">
  <img id="slide" src="duet1.jpeg">
  <div class="text" id="text">Best moments together 🥺💕</div>
</div>

<script>
let images = [
  "trio1.jpeg",
  "duet5.jpeg",
  "duet2.jpeg",
  "duet3.jpeg",
  "duet4.jpeg",
  "trio2.jpeg",
];

let texts = [
  "First crazy memory 😜",
  "Do Gaurii 🤣",
  "Supporting each other 🤝💖",
  "pookies together 🥺💖",
  "Always there 🤗",
  "Forever us 🥺✨",
];

let i=0;

setInterval(()=>{
  i=(i+1)%images.length;

  let img=document.getElementById("slide");
  let txt=document.getElementById("text");

  img.style.opacity=0;
  txt.style.opacity=0;

  setTimeout(()=>{
    img.src=images[i];
    txt.innerText=texts[i];
    img.style.opacity=1;
    txt.style.opacity=1;
  },400);

},8000);

// floating hearts
setInterval(()=>{
  let h=document.createElement("div");
  h.innerHTML="💖";
  h.className="heart";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},1000);
</script>

</body>
</html>
